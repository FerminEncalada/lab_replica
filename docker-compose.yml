version: "3.8"

services:

  pg-master:
    image: postgres:14
    container_name: pg-master
    hostname: pg-master

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: labdb

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - ./master_data:/var/lib/postgresql/data

    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=256MB
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labdb"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - pg-network


  pg-replica1:
    image: postgres:14
    container_name: pg-replica1
    hostname: pg-replica1

    ports:
      - "127.0.0.1:5433:5432"

    volumes:
      - ./replica1_data:/var/lib/postgresql/data
      - ./scripts:/scripts:ro

    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=256MB
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labdb"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - pg-network


  pg-replica2:
    image: postgres:14
    container_name: pg-replica2
    hostname: pg-replica2

    ports:
      - "127.0.0.1:5434:5432"

    volumes:
      - ./replica2_data:/var/lib/postgresql/data
      - ./scripts:/scripts:ro

    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=256MB
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d labdb"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - pg-network


networks:
  pg-network:
    driver: bridge